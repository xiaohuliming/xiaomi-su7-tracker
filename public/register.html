<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 小米 SU7 交付进度追踪</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4eaee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
            position: relative;
            overflow-y: auto;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/su7-bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.08;
            z-index: -1;
        }
        
        .register-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            width: 470px;
            max-width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            transform: translateY(0);
            animation: fadeInUp 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin: 20px auto;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 20px;
            display: none; /* 隐藏logo */
        }
        
        .logo img {
            height: 60px;
        }
        
        h1 {
            color: #ff6700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            padding-bottom: 12px;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #ff6700, #ff9966);
            border-radius: 3px;
        }
        
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.9);
        }
        
        .form-control:focus {
            border-color: #ff6700;
            box-shadow: 0 0 0 3px rgba(255, 103, 0, 0.1);
            outline: none;
        }
        
        .form-group:focus-within label {
            color: #ff6700;
        }
        
        .input-icon {
            position: absolute;
            top: 45px;
            right: 12px;
            color: #888;
            font-size: 18px;
        }
        
        .form-group:focus-within .input-icon {
            color: #ff6700;
        }
        
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #ff6700, #ff9966);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 103, 0, 0.2);
            margin-top: 10px;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            background: linear-gradient(90deg, #ff5500, #ff8844);
            box-shadow: 0 6px 16px rgba(255, 103, 0, 0.3);
        }
        
        .btn-register:active {
            transform: translateY(0);
        }
        
        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        .links a {
            color: #666;
            text-decoration: none;
            margin: 0 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .links a:hover {
            color: #ff6700;
        }
        
        .error-message {
            color: #dc3545;
            margin-top: 15px;
            text-align: center;
            display: none;
            padding: 8px 15px;
            background-color: rgba(220, 53, 69, 0.08);
            border-radius: 6px;
            font-size: 14px;
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .captcha-container input {
            flex: 1;
        }
        
        .captcha-image {
            height: 46px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .captcha-image:hover {
            transform: scale(1.03);
            border-color: #ccc;
        }
        
        .form-hint {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
            transition: all 0.3s ease;
        }
        
        .form-group:focus-within .form-hint {
            color: #ff6700;
        }
        
        /* 响应式调整 */
        @media (max-width: 576px) {
            .register-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.7em;
            }
        }
        
        /* 表单栏目标题 */
        .form-section-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #ff6700;
            margin: 25px 0 15px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(255, 103, 0, 0.2);
        }
        
        /* 背景装饰 */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }
        
        .shape {
            position: absolute;
            background: linear-gradient(45deg, #ff6700, #ff9966);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }
        
        .shape:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .shape:nth-child(2) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            right: 15%;
            animation-delay: 1s;
            background: linear-gradient(45deg, #ff9966, #ffccaa);
        }
        
        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 30%;
            left: 20%;
            animation-delay: 2s;
            background: linear-gradient(45deg, #ff8833, #ffaa77);
        }
        
        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            top: 25%;
            right: 20%;
            animation-delay: 3s;
            background: linear-gradient(45deg, #ff7722, #ff9955);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        /* 滚动条美化 */
        .register-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .register-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }
        
        .register-container::-webkit-scrollbar-thumb {
            background: rgba(255, 103, 0, 0.3);
            border-radius: 10px;
        }
        
        .register-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 103, 0, 0.5);
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="register-container animate__animated animate__fadeIn">
        <div class="logo">
            <img src="images/logo.png" alt="小米SU7">
        </div>
        <h1>用户注册</h1>
        <form id="registerForm">
            <div class="form-section-title">账号信息</div>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
                <i class="bi bi-person-fill input-icon"></i>
                <div class="form-hint">用户名只能包含字母和数字，至少3个字符</div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" required>
                <i class="bi bi-lock-fill input-icon"></i>
                <div class="form-hint">密码长度至少6个字符</div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" required>
                <i class="bi bi-key-fill input-icon"></i>
            </div>
            
            <div class="form-section-title">个人信息</div>
            <div class="form-group">
                <label for="email">电子邮箱</label>
                <input type="email" id="email" name="email" class="form-control" required>
                <i class="bi bi-envelope-fill input-icon"></i>
            </div>
            <div class="form-group">
                <label for="phone">手机号码</label>
                <input type="tel" id="phone" name="phone" class="form-control">
                <i class="bi bi-phone-fill input-icon"></i>
                <div class="form-hint">选填，方便联系您</div>
            </div>
            <div class="form-group">
                <label for="real_name">真实姓名</label>
                <input type="text" id="real_name" name="real_name" class="form-control">
                <i class="bi bi-person-badge-fill input-icon"></i>
                <div class="form-hint">选填，用于收货</div>
            </div>
            <div class="form-group">
                <label for="captcha">验证码</label>
                <div class="captcha-container">
                    <input type="text" id="captcha" name="captcha" class="form-control" required>
                    <img id="captchaImage" class="captcha-image" alt="验证码">
                </div>
            </div>
            <div class="form-group mb-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                    <label class="form-check-label" for="agreeTerms">
                        我已阅读并同意 <a href="#" class="text-decoration-none">用户协议</a> 和 <a href="#" class="text-decoration-none">隐私政策</a>
                    </label>
                </div>
            </div>
            <button type="submit" class="btn-register">注册</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
        <div class="links">
            <a href="login.html">已有账号，去登录</a>
            <span>|</span>
            <a href="index.html">回到首页</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 加载验证码
            loadCaptcha();
            
            // 点击验证码刷新
            document.getElementById('captchaImage').addEventListener('click', loadCaptcha);
            
            // 注册表单提交
            document.getElementById('registerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const real_name = document.getElementById('real_name').value;
                const agreeTerms = document.getElementById('agreeTerms').checked;
                
                // 显示加载状态
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>注册中...';
                
                // 表单验证
                if (password !== confirmPassword) {
                    const errorMessage = document.getElementById('errorMessage');
                    errorMessage.textContent = '两次输入的密码不一致';
                    errorMessage.style.display = 'block';
                    
                    // 恢复按钮状态
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
                
                if (!agreeTerms) {
                    const errorMessage = document.getElementById('errorMessage');
                    errorMessage.textContent = '请阅读并同意用户协议和隐私政策';
                    errorMessage.style.display = 'block';
                    
                    // 恢复按钮状态
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
                
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ 
                            username, 
                            password, 
                            email, 
                            phone, 
                            real_name 
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // 注册成功，显示成功消息
                        showSuccessMessage('注册成功！即将跳转到登录页面...');
                        
                        // 3秒后跳转到登录页
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 3000);
                    } else {
                        // 显示错误信息
                        const errorMessage = document.getElementById('errorMessage');
                        errorMessage.textContent = data.error || '注册失败';
                        errorMessage.style.display = 'block';
                        
                        // 恢复按钮状态
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                        
                        // 刷新验证码
                        loadCaptcha();
                    }
                } catch (error) {
                    console.error('注册失败:', error);
                    const errorMessage = document.getElementById('errorMessage');
                    errorMessage.textContent = '注册过程中发生错误，请稍后再试';
                    errorMessage.style.display = 'block';
                    
                    // 恢复按钮状态
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
            
            // 加载验证码
            function loadCaptcha() {
                const captchaImage = document.getElementById('captchaImage');
                captchaImage.src = `/api/captcha?t=${new Date().getTime()}`;
            }
            
            // 显示成功消息
            function showSuccessMessage(message) {
                const successDiv = document.createElement('div');
                successDiv.className = 'alert alert-success text-center mt-3 animate__animated animate__fadeIn';
                successDiv.role = 'alert';
                successDiv.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i>${message}`;
                
                // 隐藏错误消息
                document.getElementById('errorMessage').style.display = 'none';
                
                // 添加成功消息
                const form = document.getElementById('registerForm');
                form.parentNode.insertBefore(successDiv, form.nextSibling);
            }
            
            // 输入动画效果
            const inputs = document.querySelectorAll('.form-control');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.classList.add('animate__animated', 'animate__pulse');
                    setTimeout(() => {
                        this.parentElement.classList.remove('animate__animated', 'animate__pulse');
                    }, 1000);
                });
            });
            
            // 密码强度检测
            const passwordInput = document.getElementById('password');
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                const hint = this.parentElement.querySelector('.form-hint');
                
                if (password.length === 0) {
                    hint.textContent = '密码长度至少6个字符';
                    hint.style.color = '#888';
                } else if (password.length < 6) {
                    hint.textContent = '密码强度：弱';
                    hint.style.color = '#dc3545';
                } else if (password.length < 10) {
                    hint.textContent = '密码强度：中';
                    hint.style.color = '#fd7e14';
                } else {
                    hint.textContent = '密码强度：强';
                    hint.style.color = '#198754';
                }
            });
        });
    </script>
</body>
</html>
