<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 小米 SU7 交付进度追踪</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4eaee 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/su7-bg.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.08;
            z-index: -1;
        }
        
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            width: 430px;
            max-width: 92%;
            backdrop-filter: blur(10px);
            transform: translateY(0);
            animation: fadeInUp 0.8s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
            display: none; /* 隐藏logo */
        }
        
        .logo img {
            height: 60px;
        }
        
        h1 {
            color: #ff6700;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            padding-bottom: 12px;
        }
        
        h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(90deg, #ff6700, #ff9966);
            border-radius: 3px;
        }
        
        .form-group {
            margin-bottom: 24px;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: all 0.3s ease;
            background-color: rgba(255, 255, 255, 0.9);
        }
        
        .form-control:focus {
            border-color: #ff6700;
            box-shadow: 0 0 0 3px rgba(255, 103, 0, 0.1);
            outline: none;
        }
        
        .form-group:focus-within label {
            color: #ff6700;
        }
        
        .input-icon {
            position: absolute;
            top: 45px;
            right: 12px;
            color: #888;
            font-size: 18px;
        }
        
        .form-group:focus-within .input-icon {
            color: #ff6700;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #ff6700, #ff9966);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 103, 0, 0.2);
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            background: linear-gradient(90deg, #ff5500, #ff8844);
            box-shadow: 0 6px 16px rgba(255, 103, 0, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }
        
        .links a {
            color: #666;
            text-decoration: none;
            margin: 0 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .links a:hover {
            color: #ff6700;
        }
        
        .error-message {
            color: #dc3545;
            margin-top: 15px;
            text-align: center;
            display: none;
            padding: 8px 15px;
            background-color: rgba(220, 53, 69, 0.08);
            border-radius: 6px;
            font-size: 14px;
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .captcha-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .captcha-container input {
            flex: 1;
        }
        
        .captcha-image {
            height: 46px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .captcha-image:hover {
            transform: scale(1.03);
            border-color: #ccc;
        }
        
        /* 响应式调整 */
        @media (max-width: 576px) {
            .login-container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.7em;
            }
        }
        
        /* 背景装饰 */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }
        
        .shape {
            position: absolute;
            background: linear-gradient(45deg, #ff6700, #ff9966);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }
        
        .shape:nth-child(1) {
            width: 120px;
            height: 120px;
            top: 15%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .shape:nth-child(2) {
            width: 80px;
            height: 80px;
            bottom: 20%;
            right: 15%;
            animation-delay: 1s;
            background: linear-gradient(45deg, #ff9966, #ffccaa);
        }
        
        .shape:nth-child(3) {
            width: 60px;
            height: 60px;
            bottom: 30%;
            left: 20%;
            animation-delay: 2s;
            background: linear-gradient(45deg, #ff8833, #ffaa77);
        }
        
        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            top: 25%;
            right: 20%;
            animation-delay: 3s;
            background: linear-gradient(45deg, #ff7722, #ff9955);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="login-container animate__animated animate__fadeIn">
        <div class="logo">
            <img src="images/logo.png" alt="小米SU7">
        </div>
        <h1>用户登录</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
                <i class="bi bi-person-fill input-icon"></i>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" required>
                <i class="bi bi-lock-fill input-icon"></i>
            </div>
            <div class="form-group">
                <label for="captcha">验证码</label>
                <div class="captcha-container">
                    <input type="text" id="captcha" name="captcha" class="form-control" required>
                    <img id="captchaImage" class="captcha-image" alt="验证码">
                </div>
            </div>
            <div class="form-group mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label" for="rememberMe">记住我</label>
                </div>
            </div>
            <button type="submit" class="btn-login">登录</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
        <div class="links">
            <a href="register.html">注册新账号</a>
            <span>|</span>
            <a href="index.html">回到首页</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查用户是否已登录，如果已登录则重定向
            checkLoginStatus();
            
            // 加载验证码
            loadCaptcha();
            
            // 点击验证码刷新
            document.getElementById('captchaImage').addEventListener('click', loadCaptcha);
            
            // 检查登录状态并重定向
            function checkLoginStatus() {
                const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
                if (isLoggedIn) {
                    // 获取用户信息
                    const userInfo = JSON.parse(localStorage.getItem('user') || '{}');
                    
                    // 根据用户角色定向到对应页面
                    if (userInfo.is_admin) {
                        window.location.href = 'admin/dashboard.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }
            }
            
            // 登录表单提交
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const captcha = document.getElementById('captcha').value;
                
                // 显示加载状态
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalText = submitBtn.textContent;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>登录中...';
                
                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        // 登录成功，保存用户信息到本地存储
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('user', JSON.stringify(data.user));
                        
                        // 显示成功消息并根据用户角色跳转
                        let redirectUrl = 'index.html';
                        
                        // 检查用户是否是管理员
                        if (data.user && data.user.is_admin) {
                            redirectUrl = 'admin/dashboard.html';
                        }
                        
                        showSuccessMessage("登录成功，即将跳转...");
                        setTimeout(() => {
                            window.location.href = redirectUrl;
                        }, 1500);
                    } else {
                        // 显示错误信息
                        const errorMessage = document.getElementById('errorMessage');
                        errorMessage.textContent = data.error || '登录失败';
                        errorMessage.style.display = 'block';
                        
                        // 恢复按钮状态
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                        
                        // 刷新验证码
                        loadCaptcha();
                    }
                } catch (error) {
                    console.error('登录失败:', error);
                    const errorMessage = document.getElementById('errorMessage');
                    errorMessage.textContent = '登录过程中发生错误，请稍后再试';
                    errorMessage.style.display = 'block';
                    
                    // 恢复按钮状态
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
            
            // 加载验证码
            function loadCaptcha() {
                const captchaImage = document.getElementById('captchaImage');
                captchaImage.src = `/api/captcha?t=${new Date().getTime()}`;
            }
            
            // 显示成功消息
            function showSuccessMessage(message) {
                const successDiv = document.createElement('div');
                successDiv.className = 'alert alert-success text-center mt-3 animate__animated animate__fadeIn';
                successDiv.role = 'alert';
                successDiv.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i>${message}`;
                
                const form = document.getElementById('loginForm');
                form.parentNode.insertBefore(successDiv, form.nextSibling);
            }
            
            // 输入动画效果
            const inputs = document.querySelectorAll('.form-control');
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.classList.add('animate__animated', 'animate__pulse');
                    setTimeout(() => {
                        this.parentElement.classList.remove('animate__animated', 'animate__pulse');
                    }, 1000);
                });
            });
        });
    </script>
</body>
</html>
